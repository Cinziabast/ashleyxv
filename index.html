<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis XV Ashley</title>

  <style>
    body {
      margin: 0;
      background: #f7dce5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    #sobre {
      width: 100%;
      max-width: 420px;
      cursor: pointer;
      transition: transform 0.8s ease, opacity 0.8s ease;
      z-index: 2;
    }

    #sobre.animar {
      transform: scale(1.15);
      opacity: 0;
    }

    /* PARTICULAS */
    .sparkle {
      position: absolute;
      width: 10px;
      height: 10px;
      background: gold;
      border-radius: 50%;
      box-shadow: 0 0 12px gold;
      animation: glitterZoom 0.8s ease-out forwards;
      z-index: 5;
    }

    @keyframes glitterZoom {
      from {
        opacity: 1;
        transform: scale(0.2);
      }
      to {
        opacity: 0;
        transform: scale(4);
      }
    }
  </style>
</head>

<body>

  <img src="sobre.png" id="sobre">

  <script>
    const sobre = document.getElementById("sobre");

    function crearGlitter() {
      for (let i = 0; i < 40; i++) {
        const sparkle = document.createElement("div");
        sparkle.className = "sparkle";

        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;

        sparkle.style.left = (centerX + (Math.random() * 80 - 40)) + "px";
        sparkle.style.top = (centerY + (Math.random() * 80 - 40)) + "px";

        document.body.appendChild(sparkle);

        setTimeout(() => {
          sparkle.remove();
        }, 800);
      }
    }

    sobre.addEventListener("click", () => {
      crearGlitter();
      sobre.classList.add("animar");

      setTimeout(() => {
        window.location.href = "invitacion.html";
      }, 800);
    });
  </script>

</body>
</html>
