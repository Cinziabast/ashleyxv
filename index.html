<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis XV Ashley</title>

  <style>
    body {
      margin: 0;
      background: #f7dce5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    #sobre {
      width: 100%;
      max-width: 420px;
      cursor: pointer;
      transition: transform 0.9s ease, opacity 0.9s ease;
      z-index: 2;
    }

    #sobre.animar {
      transform: scale(1.08);
      opacity: 0;
    }

    .sparkle {
      position: absolute;
      color: #f6d57a;
      font-size: 18px;
      text-shadow: 0 0 8px #fff3b0;
      animation: sparklePop 1s ease-out forwards;
      z-index: 5;
      pointer-events: none;
    }

    @keyframes sparklePop {
      0% {
        opacity: 0;
        transform: scale(0.2) rotate(0deg);
      }
      30% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: scale(1.8) rotate(180deg);
      }
    }
  </style>
</head>

<body>

  <img src="sobre.png" id="sobre">

  <script>
    const sobre = document.getElementById("sobre");

    function crearGlitter() {
      for (let i = 0; i < 22; i++) {
        const sparkle = document.createElement("div");
        sparkle.className = "sparkle";
        sparkle.innerHTML = "✦";

        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;

        sparkle.style.left = (centerX + (Math.random() * 260 - 130)) + "px";
        sparkle.style.top = (centerY + (Math.random() * 260 - 130)) + "px";

        document.body.appendChild(sparkle);

        setTimeout(() => {
          sparkle.remove();
        }, 1000);
      }
    }

    sobre.addEventListener("click", () => {
      crearGlitter();
      sobre.classList.add("animar");

      setTimeout(() => {
        window.location.href = "invitacion.html";
      }, 900);
    });
  </script>

</body>
</html>
