<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación Ashley XV</title>

  <style>
    body {
      margin: 0;
      background: #f7dce5;
      display: flex;
      justify-content: center;
    }

    .wrap {
      position: relative;
      width: 100%;
      max-width: 430px;
      animation: entrada 1.2s ease;
    }

    .wrap img {
      width: 100%;
      display: block;
    }

    @keyframes entrada {
      from {
        opacity: 0;
        transform: scale(0.96);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .music-btn {
      position: fixed;
      top: 15px;
      right: 15px;
      z-index: 100;
      background: rgba(255, 255, 255, 0.85);
      color: #9c6b2f;
      border: 1px solid #d8b36a;
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(0,0,0,0.15);
    }

    .btn {
      position: absolute;
      left: 28%;
      width: 44%;
      height: 2%;
      z-index: 10;
    }

    .ubicacion {
      top: 59%;
    }

    .confirmar {
      top: 80%;
    }
  </style>
</head>

<body>

  <audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <button class="music-btn" onclick="activarMusica()">♫ Activar música</button>

  <div class="wrap">
    <img src="invitacion.png" alt="Invitación Ashley XV">

    <a class="btn ubicacion"
       href="https://maps.app.goo.gl/vXV5YjBapW6pfaeD9"
       target="_blank"></a>

    <a class="btn confirmar"
       href="https://wa.me/4915561264387?text=Hola%20Ashley%20%F0%9F%91%8B%0ACon%20mucho%20gusto%20confirmo%20mi%20asistencia%20a%20tus%20XV%20%F0%9F%92%96"
       target="_blank"></a>
  </div>

  <script>
    function activarMusica() {
      const musica = document.getElementById("musica");
      musica.play();
      document.querySelector(".music-btn").innerText = "♫ Música activada";
    }
  </script>

</body>
</html>
