<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación Ashley XV</title>

  <style>
    body {
      margin: 0;
      background: #f7dce5;
      display: flex;
      justify-content: center;
    }

    .wrap {
      position: relative;
      width: 100%;
      max-width: 430px;
      animation: entrada 1.2s ease;
    }

    .wrap img {
      width: 100%;
      display: block;
    }

    @keyframes entrada {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }

    /* BOTONES */
    .btn {
      position: absolute;
      left: 28%;
      width: 44%;
      height: 2%;
      z-index: 10;
      border-radius: 25px;
    }

    .ubicacion { top: 59%; }
    .confirmar { top: 80%; }

    /* BRILLO MEJORADO */
    .glow {
      border-radius: 25px;
      animation: brillo 1.8s infinite;
    }

    @keyframes brillo {
      0% {
        box-shadow: 0 0 0 rgba(255,215,160,0);
      }
      50% {
        box-shadow: 0 0 22px rgba(255,215,160,0.9);
      }
      100% {
        box-shadow: 0 0 0 rgba(255,215,160,0);
      }
    }

    /* BOTÓN MÚSICA */
    .music-btn {
      position: fixed;
      top: 15px;
      right: 15px;
      z-index: 200;
      background: rgba(255,255,255,0.9);
      color: #9c6b7b;
      border: 1px solid #e3b5c4;
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(0,0,0,0.15);
    }

    /* POPUP */
    .popup-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.45);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 300;
    }

    .popup {
      background: linear-gradient(180deg, #ffe4ec, #ffd6e7);
      border: 2px solid #e7b3c5;
      border-radius: 22px;
      padding: 25px 20px;
      width: 85%;
      max-width: 330px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      animation: aparecer 0.4s ease;
    }

    @keyframes aparecer {
      from { transform: scale(0.85); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .popup h2 {
      color: #9c6073;
      margin-bottom: 10px;
    }

    .popup p {
      font-size: 14px;
      color: #7a4d5d;
      margin-bottom: 20px;
    }

    .popup button {
      display: block;
      width: 100%;
      margin: 9px 0;
      padding: 11px;
      border: none;
      border-radius: 25px;
      font-size: 14px;
      cursor: pointer;
    }

    .si { background: #c08a9e; color: white; }
    .no { background: #e0a7b7; color: white; }
    .cerrar { background: transparent; color: #9c6073; }

  </style>
</head>

<body>

  <!-- AUDIO MÚSICA -->
  <audio id="musica" loop autoplay>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <button class="music-btn" onclick="activarMusica()">♫ Activar música</button>

  <div class="wrap">
    <img src="invitacion.png" alt="Invitación Ashley XV">

    <!-- UBICACIÓN -->
    <a class="btn ubicacion glow"
       href="https://maps.app.goo.gl/vXV5YjBapW6pfaeD9"
       target="_blank"></a>

    <!-- CONFIRMAR -->
    <div class="btn confirmar glow" onclick="abrirPopup()"></div>
  </div>

  <!-- POPUP -->
  <div class="popup-bg" id="popup">
    <div class="popup">
      <h2>Confirmar asistencia 💖</h2>
      <p>Tu presencia hará este día aún más especial</p>

      <button class="si" onclick="asistire()">Sí asistiré ✨</button>
      <button class="no" onclick="noAsistire()">No podré asistir 💌</button>

      <button class="cerrar" onclick="cerrarPopup()">Cerrar</button>
    </div>
  </div>

  <script>
    function activarMusica() {
      const audio = document.getElementById("musica");
      audio.play();
      document.querySelector(".music-btn").innerText = "♫ Música activada";
    }

    function abrirPopup() {
      document.getElementById("popup").style.display = "flex";
    }

    function cerrarPopup() {
      document.getElementById("popup").style.display = "none";
    }

    function asistire() {
      window.open("https://wa.me/4915561264387?text=Hola%20Ashley%20💖%0ACon%20muchísima%20ilusión%20te%20confirmo%20que%20asistiré%20a%20tus%20XV.%20Será%20un%20honor%20acompañarte%20en%20un%20día%20tan%20especial%20✨", "_blank");
    }

    function noAsistire() {
      window.open("https://wa.me/4915561264387?text=Hola%20Ashley%20💖%0AQuiero%20agradecerte%20de%20corazón%20por%20tu%20invitación.%20Lamentablemente%20no%20podré%20asistir,%20pero%20te%20deseo%20una%20celebración%20hermosa%20y%20llena%20de%20momentos%20inolvidables%20✨", "_blank");
    }
  </script>

</body>
</html>
